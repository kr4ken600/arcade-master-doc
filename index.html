<!DOCTYPE html>
<html>

<head>
  <title>Arcade Master API</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css">
</head>

<body>
  <div id="api-reference"></div>

  <script>
    var scalarConfig = {
      spec: {
        url: './openapi.json',
      },
      hideModels: true,
      hideDownloadButton: true,
      hideDarkModeToggle: true,
    };

    var apiReferenceElement = document.getElementById('api-reference');
    apiReferenceElement.dataset.configuration = JSON.stringify(scalarConfig);
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
</body>

</html>
